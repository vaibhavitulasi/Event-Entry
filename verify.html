<!DOCTYPE html>

<html>
<head>
  <title>Event Entry</title>
  <script type="module"></script>
</head>

<body style="text-align:center; font-family:sans-serif;">

<h2>Event Entry Check</h2>
<div id="result">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔴 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyDFMvn_a8eDJSII4PNCoYjHRMElD8mJE-8",
  authDomain: "event-entry-bc734.firebaseapp.com",
  projectId: "event-entry-bc734",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const result = document.getElementById("result");

// 🔍 GET ID FROM URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if (!id) {
  result.innerHTML = "❌ No ID found in URL";
} else {
  const ref = doc(db, "students", id);

  getDoc(ref).then((snap) => {
    if (!snap.exists()) {
      result.innerHTML = "❌ Not Allowed";
    } else {
      const user = snap.data();

      console.log(user.photo);
      
      if (user.dept !== "CSE") {
        result.innerHTML = "❌ Not Your Department";
      } else {
        result.innerHTML = `
          <h2>✅ Allowed</h2>
          <img src="${user.photo}" width="120"><br><br>
          Name: ${user.Name}<br>
          Roll: ${user.roll}
        `;
      }
    }
  }).catch((error) => {
    result.innerHTML = "⚠️ Error: " + error.message;
  });
}
</script>

</body>
</html>
