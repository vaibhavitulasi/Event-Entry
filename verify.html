<!DOCTYPE html>

<html>
<head>
  <title>Event Entry</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      font-family: Arial, sans-serif;
    }

    .card {
      background: white;
      padding: 75px;
      border-radius: 45px;
      box-shadow: 0 20px 45px rgba(0,0,0,0.2);
      text-align: center;
      width: 380px;
    }

    .card img {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #4facfe;
    }

    .name {
      font-size: 30px;
      font-weight: bold;
      margin-top: 10px;
    }

    .roll {
      color: gray;
      margin-bottom: 15px;
    }

    .status {
      font-size: 38px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .allowed {
      color: green;
    }

    .denied {
      color: red;
    }
  </style>

</head>

<body>

<div class="card" id="result">
  Loading...
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDFMvn_a8eDJSII4PNCoYjHRMElD8mJE-8",
  authDomain: "event-entry-bc734.firebaseapp.com",
  projectId: "event-entry-bc734",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const result = document.getElementById("result");

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if (!id) {
  result.innerHTML = `<div class="status denied">❌ Invalid QR</div>`;
} else {
  const ref = doc(db, "students", id);

  getDoc(ref).then((snap) => {
    if (!snap.exists()) {
      result.innerHTML = `<div class="status denied">❌ Not Allowed</div>`;
    } else {
      const user = snap.data();

      if (user.dept !== "CSE") {
        result.innerHTML = `<div class="status denied">❌ Not Your Department</div>`;
      } else {
        result.innerHTML = `
          <div class="status allowed">✅ Entry Allowed</div>
          <img src="${user.photo}">
          <div class="name">${user.name}</div>
          <div class="roll">Roll: ${user.roll}</div>
        `;
      }
    }
  }).catch(() => {
    result.innerHTML = `<div class="status denied">⚠️ Error loading data</div>`;
  });
}
</script>

</body>
</html>
