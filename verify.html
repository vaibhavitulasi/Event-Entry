<!DOCTYPE html>

<html>
<head>
  <title>Event Entry Check</title>
</head>
<body style="text-align:center; font-family:sans-serif;">

<h2>Event Entry Check</h2>
<h3 id="result">Checking...</h3>

<script>
  const database = {
    "xyz123": {name: "T. Sai Vaibhavi", roll: "23BK1A0562"},
    "ID002": {name: "Sneha", roll: "22bk1a0501"},
    "ID003": {name: "Arjun", roll: "103"}
  };

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  let used = JSON.parse(localStorage.getItem("used")) || {};

  if (!id || !database[id]) {
    document.getElementById("result").innerHTML = "❌ Invalid QR";
    document.body.style.backgroundColor = "lightcoral";
  }
  else if (used[id]) {
    document.getElementById("result").innerHTML = "⚠️ Already Used";
    document.body.style.backgroundColor = "orange";
  }
  else {
    used[id] = true;
    localStorage.setItem("used", JSON.stringify(used));

    let user = database[id];

    document.getElementById("result").innerHTML =
      `✅ Allowed <br> Name: ${user.name} <br> Roll: ${user.roll}`;
    document.body.style.backgroundColor = "lightgreen";
  }
</script>

</body>
</html>
